<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GempakMovies | Portal Filem & Streaming</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan font ikon FontAwesome untuk profil & kegemaran -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">GempakMovies</div>
        
        <!-- Tab Penukaran Kandungan -->
        <div class="nav-tabs">
            <span id="tab-movies" class="nav-tab active">Filem</span>
            <span id="tab-tv" class="nav-tab">Siri TV</span>
            <span id="tab-watchlist" class="nav-tab">Watchlist Saya</span>
        </div>

        <!-- Bahagian Kanan Nav (Carian & Profil) -->
        <div class="search-container">
            <input type="text" id="search" class="search-bar" placeholder="Cari di sini...">
            
            <!-- Menu Profil Pengguna -->
            <div class="profile-dropdown">
                <button id="profile-btn" class="profile-btn">
                    <i class="fa-solid fa-user"></i> Profil
                </button>
                <div id="profile-menu" class="dropdown-content">
                    <p id="user-email-display">Memuatkan emel...</p>
                    <p id="user-joined-display" class="user-meta-text">Daftar: -</p>
                    <hr style="border-color: #333; margin: 10px 0;">
                    <button id="logout-btn" class="logout-btn-link">Keluar Akaun</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <h2 id="title-display" class="section-title">Filem Popular Hari Ini</h2>
        <div id="movie-grid" class="movie-grid">
            <!-- Data dimasukkan secara dinamik oleh JavaScript -->
        </div>
    </main>

    <!-- HTML POP-UP MODAL DENGAN SERVER PLAYER -->
    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            
            <!-- Ruang Player Video (Iframe) -->
            <div class="player-container">
                <iframe id="video-player" src="" allowfullscreen scrolling="no" allow="autoplay"></iframe>
            </div>

            <!-- Ruang Informasi Filem / Siri TV -->
            <div class="modal-details">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 15px;">
                    <h2 id="modal-title" class="modal-title">Tajuk Kandungan</h2>
                    <!-- Butang Watchlist -->
                    <button id="modal-watchlist-btn" class="watchlist-toggle-btn">
                        <i class="fa-regular fa-bookmark"></i> Tambah Watchlist
                    </button>
                </div>
                <div class="modal-meta">
                    <span id="modal-year">Tahun</span>
                    <span id="modal-rating" style="color: #f5c518;">★ 0.0</span>
                </div>
                <p id="modal-overview" class="modal-overview">Sinopsis...</p>
                
                <!-- Pemilihan Episod (Hanya untuk Siri TV) -->
                <div id="episodes-container" class="episodes-container" style="display: none;">
                    <h3 class="episodes-title">Senarai Episod</h3>
                    <div id="episodes-list" class="episodes-list">
                        <!-- Butang episod akan dimasukkan secara dinamik oleh JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 GempakMovies. Dikuasakan oleh TMDB & Embed Pihak Ketiga.</p>
    </footer>

    <!-- Dipanggil menggunakan type="module" untuk sokongan Firebase SDK modular -->
    <script type="module" src="script.js"></script>
</body>
</html>
